<svg xmlns="http://www.w3.org/2000/svg" width="780" height="330" viewBox="0 0 780 330" font-family="ui-monospace, 'JetBrains Mono', Menlo, Consolas, monospace">
  <defs>
    <clipPath id="l1"><rect x="0" y="52" width="0" height="24"><animate attributeName="width" from="0" to="780" begin="0.4s" dur="0.7s" fill="freeze"/></rect></clipPath>
    <clipPath id="l2"><rect x="0" y="78" width="0" height="24"><animate attributeName="width" from="0" to="780" begin="1.3s" dur="0.9s" fill="freeze"/></rect></clipPath>
    <clipPath id="l3"><rect x="0" y="104" width="0" height="24"><animate attributeName="width" from="0" to="780" begin="2.3s" dur="0.9s" fill="freeze"/></rect></clipPath>
    <clipPath id="l4"><rect x="0" y="146" width="0" height="24"><animate attributeName="width" from="0" to="780" begin="3.5s" dur="0.7s" fill="freeze"/></rect></clipPath>
    <clipPath id="l5"><rect x="0" y="172" width="0" height="24"><animate attributeName="width" from="0" to="780" begin="4.3s" dur="0.9s" fill="freeze"/></rect></clipPath>
    <clipPath id="l6"><rect x="0" y="198" width="0" height="24"><animate attributeName="width" from="0" to="780" begin="5.3s" dur="0.9s" fill="freeze"/></rect></clipPath>
    <clipPath id="l7"><rect x="0" y="224" width="0" height="24"><animate attributeName="width" from="0" to="780" begin="6.3s" dur="0.5s" fill="freeze"/></rect></clipPath>
    <clipPath id="tape"><rect x="1" y="290" width="778" height="39"/></clipPath>
  </defs>

  <!-- window -->
  <rect x="0.5" y="0.5" width="779" height="329" rx="10" fill="#0b0f0d" stroke="#27e27f" stroke-opacity="0.25"/>

  <!-- title bar -->
  <circle cx="20" cy="18" r="5.5" fill="#ff5f56"/>
  <circle cx="38" cy="18" r="5.5" fill="#ffbd2e"/>
  <circle cx="56" cy="18" r="5.5" fill="#27c93f"/>
  <text x="390" y="22" text-anchor="middle" font-size="11" letter-spacing="2" fill="#27e27f" fill-opacity="0.7">SKSM TERMINAL v1.0 · GO</text>
  <line x1="0" y1="34" x2="780" y2="34" stroke="#27e27f" stroke-opacity="0.15"/>

  <!-- session -->
  <g font-size="13.5">
    <text x="22" y="68" clip-path="url(#l1)"><tspan fill="#27e27f">SKSM@GH:~$</tspan><tspan fill="#e8fff2"> whoami</tspan></text>
    <text x="22" y="94" fill="#9df5c4" clip-path="url(#l2)">saksham arora · systems + quant · CSE undergrad</text>
    <text x="22" y="120" fill="#9df5c4" clip-path="url(#l3)">constraint of choice: nanoseconds, not lines of code</text>

    <text x="22" y="162" clip-path="url(#l4)"><tspan fill="#27e27f">SKSM@GH:~$</tspan><tspan fill="#e8fff2"> positions --open</tspan></text>
    <text x="22" y="188" fill="#9df5c4" clip-path="url(#l5)">IMC Prosperity 4 <tspan fill="#e8fff2">rank 154 / 18,800+ teams</tspan> (top 0.8%)</text>
    <text x="22" y="214" fill="#9df5c4" clip-path="url(#l6)">matching engine <tspan fill="#e8fff2">2.7M ops/s · p99 900ns</tspan> · lock-free C++20</text>

    <text x="22" y="248" clip-path="url(#l7)"><tspan fill="#27e27f">SKSM@GH:~$</tspan></text>
    <rect x="118" y="236" width="9" height="15" fill="#27e27f" opacity="0">
      <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.01;0.5;0.51;1" dur="1.1s" begin="6.9s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- ticker tape -->
  <line x1="0" y1="290" x2="780" y2="290" stroke="#27e27f" stroke-opacity="0.15"/>
  <g clip-path="url(#tape)">
    <text y="314" font-size="12" fill="#27e27f">
      <animateTransform attributeName="transform" type="translate" from="780 0" to="-1450 0" dur="22s" repeatCount="indefinite"/>
      HFT-ENG ▲ 2.7M ops/s&#160;&#160;·&#160;&#160;GITRADE ▲ live market in a README&#160;&#160;·&#160;&#160;LLM-BENCH ▲ p99 or it didn't happen&#160;&#160;·&#160;&#160;QRS ▲ Black-Scholes in 731 bytes&#160;&#160;·&#160;&#160;IMC-P4 ▲ top 0.8%&#160;&#160;·&#160;&#160;SLEEP ▼ limit down
    </text>
  </g>
</svg>
