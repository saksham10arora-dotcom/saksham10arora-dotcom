<svg xmlns="http://www.w3.org/2000/svg" width="780" height="300" viewBox="0 0 780 300" font-family="'IBM Plex Mono', ui-monospace, Menlo, Consolas, monospace">
  <defs>
    <clipPath id="l1"><rect x="0" y="50" width="0" height="24"><animate attributeName="width" from="0" to="780" begin="0.4s" dur="0.7s" fill="freeze"/></rect></clipPath>
    <clipPath id="l2"><rect x="0" y="76" width="0" height="24"><animate attributeName="width" from="0" to="780" begin="1.3s" dur="0.9s" fill="freeze"/></rect></clipPath>
    <clipPath id="l3"><rect x="0" y="102" width="0" height="24"><animate attributeName="width" from="0" to="780" begin="2.3s" dur="0.9s" fill="freeze"/></rect></clipPath>
    <clipPath id="l4"><rect x="0" y="128" width="0" height="24"><animate attributeName="width" from="0" to="780" begin="3.3s" dur="0.9s" fill="freeze"/></rect></clipPath>
    <clipPath id="l5"><rect x="0" y="168" width="0" height="24"><animate attributeName="width" from="0" to="780" begin="4.4s" dur="0.7s" fill="freeze"/></rect></clipPath>
    <clipPath id="l6"><rect x="0" y="194" width="0" height="24"><animate attributeName="width" from="0" to="780" begin="5.2s" dur="0.9s" fill="freeze"/></rect></clipPath>
    <clipPath id="tape"><rect x="1" y="258" width="778" height="41"/></clipPath>
  </defs>

  <!-- window -->
  <rect x="0.5" y="0.5" width="779" height="299" rx="10" fill="#0d0b14" stroke="#aa42ff" stroke-opacity="0.35"/>

  <!-- title bar -->
  <circle cx="20" cy="17" r="5.5" fill="#ff5f56"/>
  <circle cx="38" cy="17" r="5.5" fill="#ffbd2e"/>
  <circle cx="56" cy="17" r="5.5" fill="#27c93f"/>
  <text x="390" y="21" text-anchor="middle" font-size="11" letter-spacing="2" fill="#aa42ff" fill-opacity="0.8">SKSM TERMINAL · LIVE SESSION</text>
  <line x1="0" y1="32" x2="780" y2="32" stroke="#aa42ff" stroke-opacity="0.2"/>

  <!-- session -->
  <g font-size="13.5">
    <text x="22" y="66" clip-path="url(#l1)"><tspan fill="#aa42ff">SKSM@GH:~$</tspan><tspan fill="#efe9ff"> tail -f /var/log/grind</tspan></text>
    <text x="22" y="92" fill="#c9c0e0" clip-path="url(#l2)">[DSA]&#160;&#160;&#160;CSES → Codeforces · 2 problems/day · streak alive</text>
    <text x="22" y="118" fill="#c9c0e0" clip-path="url(#l3)">[C++]&#160;&#160;&#160;A Tour of C++ → Effective Modern C++ · lock-free by hand</text>
    <text x="22" y="144" fill="#c9c0e0" clip-path="url(#l4)">[QUANT] MIT 18.642 probability · market microstructure</text>

    <text x="22" y="184" clip-path="url(#l5)"><tspan fill="#aa42ff">SKSM@GH:~$</tspan><tspan fill="#efe9ff"> ./gitrade --join</tspan></text>
    <text x="22" y="210" fill="#c9c0e0" clip-path="url(#l6)">order accepted: submit a bot via PR · trade <tspan fill="#efe9ff">$STAR $COMMIT $FORK</tspan></text>

    <text x="22" y="240" fill="#aa42ff" clip-path="url(#l6)">SKSM@GH:~$</text>
    <rect x="118" y="228" width="9" height="15" fill="#aa42ff" opacity="0">
      <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.01;0.5;0.51;1" dur="1.1s" begin="6.4s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- ticker tape -->
  <line x1="0" y1="258" x2="780" y2="258" stroke="#aa42ff" stroke-opacity="0.2"/>
  <g clip-path="url(#tape)">
    <text y="283" font-size="12" fill="#aa42ff">
      <animateTransform attributeName="transform" type="translate" from="780 0" to="-1500 0" dur="22s" repeatCount="indefinite"/>
      HFT-ENG ▲ 2.7M ops/s p99 900ns&#160;&#160;·&#160;&#160;IMC-P4 ▲ rank 154 / 18,800+ (top 0.8%)&#160;&#160;·&#160;&#160;GITRADE ▲ live market in a README&#160;&#160;·&#160;&#160;LLM-BENCH ▲ percentiles not averages&#160;&#160;·&#160;&#160;QRS ▲ Black-Scholes in 731 bytes&#160;&#160;·&#160;&#160;SLEEP ▼ limit down
    </text>
  </g>
</svg>
